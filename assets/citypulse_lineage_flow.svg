<svg width="1400" height="760" xmlns="http://www.w3.org/2000/svg">
<style>text{font-family:Arial,Helvetica,sans-serif} .title{font-size:28px;font-weight:bold}.box{fill:#f8f8f8;stroke:#222;stroke-width:2}.schema{font-size:20px;font-weight:bold}.small{font-size:16px}.arrow{stroke:#222;stroke-width:3;marker-end:url(#arrow)}</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#222"/></marker></defs>
<text x="40" y="45" class="title">CityPulse Data Lineage: ETL Output to Reporting Marts</text>
<rect x="40" y="90" width="250" height="150" class="box"/><text x="65" y="125" class="schema">CityPulse ETL</text><text x="65" y="160" class="small">Ingests and validates</text><text x="65" y="185" class="small">service request records</text><text x="65" y="215" class="small">Output: public.service_requests</text>
<rect x="380" y="90" width="250" height="150" class="box"/><text x="405" y="125" class="schema">staging</text><text x="405" y="160" class="small">Warehouse-controlled copy</text><text x="405" y="185" class="small">Standardized fields</text><text x="405" y="215" class="small">staging.service_requests</text>
<rect x="720" y="90" width="300" height="150" class="box"/><text x="745" y="125" class="schema">warehouse</text><text x="745" y="160" class="small">dim_date, dim_location</text><text x="745" y="185" class="small">dim_request_type, dim_status</text><text x="745" y="215" class="small">fact_service_requests</text>
<rect x="1110" y="90" width="250" height="150" class="box"/><text x="1135" y="125" class="schema">marts</text><text x="1135" y="160" class="small">Monthly volume</text><text x="1135" y="185" class="small">Response time</text><text x="1135" y="210" class="small">Priority trends, backlog</text>
<line x1="290" y1="165" x2="380" y2="165" class="arrow"/><line x1="630" y1="165" x2="720" y2="165" class="arrow"/><line x1="1020" y1="165" x2="1110" y2="165" class="arrow"/>
<rect x="90" y="330" width="1220" height="330" fill="#fff" stroke="#777" stroke-width="2"/>
<text x="120" y="370" class="schema">What each boundary means</text>
<text x="120" y="415" class="small">1. ETL boundary: CityPulse ETL owns ingestion/cleaning. This warehouse does not duplicate scraping or raw cleanup.</text>
<text x="120" y="455" class="small">2. Staging boundary: The warehouse imports cleaned ETL output into a controlled schema for repeatable transformations.</text>
<text x="120" y="495" class="small">3. Dimensional boundary: Facts and dimensions enforce the analytical grain: one row per service request event.</text>
<text x="120" y="535" class="small">4. Mart boundary: Materialized views expose simplified reporting tables for dashboard and analyst use cases.</text>
<text x="120" y="595" class="small">Quality gates run after warehouse and mart creation to check duplicates, missing timestamps, orphaned keys, and invalid metrics.</text>
</svg>
